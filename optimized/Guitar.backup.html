<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Javascript Guitar</title>

<style>
  body {
    font-family: Arial;
    margin: 20px;
  }

  .neck {
    text-align: center;
    line-height: 0;
  }

  button {
    background: #ccc;
    border: 1px solid #999;
    padding: 5px 8px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h2>Javascript Guitar</h2>

<div class="neck" id="neck"></div>

<div style="margin-top:20px;">
  <div id="noteButtons" style="display:flex; gap:4px; flex-wrap:wrap;"></div>
</div>

<div style="margin-top:10px;">
  <label><input type="radio" name="color" value="black" checked> Black</label>
  <label style="margin-left:10px;"><input type="radio" name="color" value="red"> Red</label>
</div>

<div style="margin-top:10px;">
  <label><input type="checkbox" id="leaveNotes"> Leave notes on the neck</label>
</div>

<div style="margin-top:10px;">
  <button id="resetBtn">Reset</button>
</div>

<script>

// ===================== CONFIG =====================
const STRINGS = 6;
const FRETS = 23;

const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

const TUNING = {
  1: "E",
  2: "B",
  3: "G",
  4: "D",
  5: "A",
  6: "E"
};

// ===================== DOT POSITIONS =====================
const upperDots = new Set([
  "4,3","4,5","4,7","4,9",
  "4,15","4,17","4,19","4,21",
  "6,12","2,12"
]);

const lowerDots = new Set([
  "3,3","3,5","3,7","3,9",
  "3,15","3,17","3,19","3,21",
  "5,12",
  "1,12"
]);

// ===================== IMAGE MAPS =====================
const NORMAL = {
  1:"note1.gif",2:"note2.gif",3:"note21.gif",4:"note22.gif",5:"note23.gif",
  6:"note24.gif",7:"note25.gif",8:"note215.gif",9:"note225.gif",
  10:"note235.gif",11:"note245.gif"
};

const LOWER_DOT = {
  1:"note3.gif",2:"note4.gif",3:"note41.gif",4:"note42.gif",5:"note43.gif",
  6:"note44.gif",7:"note45.gif",8:"note415.gif",9:"note425.gif",
  10:"note435.gif",11:"note445.gif"
};

const UPPER_DOT = {
  1:"note5.gif",2:"note6.gif",3:"note61.gif",4:"note62.gif",5:"note63.gif",
  6:"note64.gif",7:"note65.gif",8:"note615.gif",9:"note625.gif",
  10:"note635.gif",11:"note645.gif"
};

const NUT = {
  0:"note8.gif",
  1:"note7.gif",
  7:"note75.gif"
};

// ===================== IMAGE PRELOAD =====================
function preloadImages(){
  const all = [];

  function add(map){
    for(const k in map){
      all.push("images/" + map[k]);
    }
  }

  add(NORMAL);
  add(LOWER_DOT);
  add(UPPER_DOT);
  add(NUT);

  all.forEach(src => {
    const img = new Image();
    img.src = src;
  });
}

preloadImages();

// ===================== STATE =====================
let neck = [];
let noteMap = {};

// ===================== HELPERS =====================
function getCellType(s,f){
  if(f===0) return "nut";
  const k = `${s},${f}`;
  if(upperDots.has(k)) return "upperDot";
  if(lowerDots.has(k)) return "lowerDot";
  return "normal";
}

function getImage(cell){
  if(cell.type === "nut") return NUT[cell.state];
  if(cell.type === "upperDot") return UPPER_DOT[cell.state];
  if(cell.type === "lowerDot") return LOWER_DOT[cell.state];
  return NORMAL[cell.state];
}

// ===================== STATE RULE =====================
function setCellState(cell, color){
  if(cell.type === "nut"){
    cell.state = (color === "red") ? 7 : 1;
    return;
  }
  cell.state = (color === "red") ? 7 : 2;
}

// ===================== BUILD NECK =====================
function buildNeck(){
  neck = [];

  for(let s=1;s<=STRINGS;s++){
    neck[s] = [];

    for(let f=0;f<FRETS;f++){
      const type = getCellType(s,f);

      neck[s][f] = {
        string: s,
        fret: f,
        type: type,
        state: (type === "nut" ? 0 : 1)
      };
    }
  }
}

// ===================== NOTE MAP =====================
function buildNoteMap(){
  noteMap = {};
  NOTES.forEach(n => noteMap[n] = []);

  const idx = {};
  NOTES.forEach((n,i)=>idx[n]=i);

  for(let s=1;s<=STRINGS;s++){
    const open = idx[TUNING[s]];
    for(let f=0;f<FRETS;f++){
      const note = NOTES[(open + f) % 12];
      noteMap[note].push({string:s,fret:f});
    }
  }
}

// ===================== RENDER =====================
function render(){
  const el = document.getElementById("neck");
  el.innerHTML = "";

  for(let s=1;s<=STRINGS;s++){
    for(let f=0;f<FRETS;f++){
      const c = neck[s][f];

      const img = document.createElement("img");
      img.src = "images/" + getImage(c);
      img.width = 31;
      img.height = 13;

      el.appendChild(img);
    }
    el.appendChild(document.createElement("br"));
  }
}

// ===================== BUTTONS =====================
function buildButtons(){
  const el = document.getElementById("noteButtons");

  NOTES.forEach(n=>{
    const b = document.createElement("button");
    b.textContent = n;

    b.onclick = () => {
      const leave = document.getElementById("leaveNotes").checked;
      const color = document.querySelector('input[name="color"]:checked').value;

      if(!leave) buildNeck();

      noteMap[n].forEach(p=>{
        setCellState(neck[p.string][p.fret], color);
      });

      render();
    };

    el.appendChild(b);
  });
}

// ===================== RESET =====================
document.getElementById("resetBtn").onclick = () => {
  buildNeck();
  render();
};

// ===================== INIT =====================
buildNeck();
buildNoteMap();
buildButtons();
render();

</script>

</body>
</html>
